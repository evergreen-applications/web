<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evergreen Applications</title>
  <meta name="description" content="Evergreen Applications is a small software studio building focused, well-made apps." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="images/evergreen-applications-logo.png" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="./" class="brand">
      <img class="brand-logo" src="images/evergreen-applications-logo.png" alt="Evergreen Applications" />
      Evergreen Applications
    </a>
  </div>
</header>

<main>
  <div class="hero wrap">
    <p class="eyebrow">About Us</p>
    <h1>We build focused, well-made apps.</h1>
  </div>

  <div class="section wrap">
    <span class="eyebrow">Our apps</span>
    <a class="app-card" href="trackpack/">
      <span class="app-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
      </span>
      <span class="app-card-body">
        <h3>TrackPack</h3>
        <p>Track packages from any shipping carrier in one iPhone dashboard.</p>
      </span>
      <span class="app-card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </span>
    </a>
  </div>

</main>

<footer class="site-footer">
  <div class="wrap">
    <span>&copy; 2026 Evergreen Applications. All rights reserved.</span>
  </div>
</footer>

</body>
</html>
